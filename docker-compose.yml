services:
  postgres:
    image: postgres:18-alpine
    container_name: user_management_db
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER must be set}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:-user_management_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - user-management-network

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: user_management_app
    environment:
      PORT: ${PORT:-3000}
      DB_USER: ${DB_USER:?DB_USER must be set}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432} #specifically for the app to connect to pgadmin
      DB_NAME: ${DB_NAME:-user_management_db}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src/logs:/app/src/logs
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - user-management-network
    command: sh -c "npm run init-db && npm start"

volumes:
  postgres_data:

networks:
  user-management-network:
    driver: bridge
